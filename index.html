<!DOCTYPE html>
<html>
<head>
<title>HTML & CSS MCQ Exam</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

/* BODY */
body{
background:#f4f4f4;
}

/* MOBILE BLOCK SCREEN */
#mobileBlock{
display:none;
height:100vh;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:#111;
color:#fff;
}

/* MAIN CONTAINER */
.container{
max-width:900px;
width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* QUESTION */
.question{
margin-bottom:18px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}

.correct{background:#d4edda;}
.wrong{background:#f8d7da;}

button{
padding:12px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

#timer{
font-size:20px;
color:red;
margin-bottom:15px;
}

/* RESPONSIVE */
@media(max-width:768px){
.container{
padding:15px;
}
.question p{
font-size:15px;
}
label{
font-size:14px;
}
}

</style>

</head>

<body>

<!-- 🚫 MOBILE BLOCK -->
<div id="mobileBlock">
<h2>🚫 Desktop Only Exam</h2>
<p>Please use a <b>Computer / Laptop</b> to take this exam.</p>
</div>

<!-- ✅ MAIN EXAM -->
<div class="container" id="examContainer">

<h2>HTML & CSS MCQ Exam (100 Questions)</h2>
<div id="timer">Time Left: 50:00</div>

<form id="examForm">
<div id="questionArea"></div>
<button type="submit">Submit Exam</button>
</form>

<h2 id="result"></h2>

</div>

<script>

/* 🚫 DEVICE DETECTION */
function isMobile(){
return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
}

if(isMobile()){
document.getElementById("mobileBlock").style.display="flex";
document.getElementById("examContainer").style.display="none";
}

/* SHUFFLE */
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

/* SAMPLE QUESTIONS (you can plug your 100 here) */
var questions = [
{q:"What does HTML stand for?",options:["Hyper Text Markup Language","High Text Machine Language","Hyper Tool Language","None"],answer:0},
{q:"Which CSS property sets text color?",options:["color","text-color","font-color","bg"],answer:0},
{q:"Which tag creates a link?",options:["a","link","href","nav"],answer:0},
{q:"Which property creates flex layout?",options:["display:flex","flex","layout","grid"],answer:0}
];

/* AUTO EXPAND TO 100 */
while(questions.length < 100){
questions = questions.concat(questions.slice(0,100-questions.length));
}

/* RANDOMIZE */
shuffle(questions);

questions.forEach(q=>{
let correct = q.options[q.answer];
shuffle(q.options);
q.answer = q.options.indexOf(correct);
});

/* RENDER */
var html="";
questions.forEach((q,i)=>{
html+=`<div class="question" id="question${i}">
<p>${i+1}. ${q.q}</p>

<label><input type="radio" name="q${i}" value="0" required> ${q.options[0]}</label><br>
<label><input type="radio" name="q${i}" value="1"> ${q.options[1]}</label><br>
<label><input type="radio" name="q${i}" value="2"> ${q.options[2]}</label><br>
<label><input type="radio" name="q${i}" value="3"> ${q.options[3]}</label><br>

</div>`;
});

document.getElementById("questionArea").innerHTML=html;

/* SUBMIT */
document.getElementById("examForm").onsubmit=function(e){
e.preventDefault();

var score=0;

questions.forEach((q,i)=>{
var selected=document.querySelector('input[name="q'+i+'"]:checked');
var box=document.getElementById("question"+i);

if(Number(selected.value)===q.answer){
score++;
box.classList.add("correct");
}else{
box.classList.add("wrong");
}

box.innerHTML+=`<p><b>Correct Answer:</b> ${q.options[q.answer]}</p>`;
});

document.getElementById("result").innerHTML="Your Score: "+score+" / 100";
};

/* TIMER */
var time=3000;

setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerHTML=`Time Left: ${m}:${s<10?"0":""}${s}`;
time--;
if(time<0) document.getElementById("examForm").requestSubmit();
},1000);

</script>

</body>
</html>
