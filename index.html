<!DOCTYPE html>
<html>
<head>
<title>HTML & CSS MCQ Exam</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:900px;
margin:auto;
background:white;
padding:20px;
}

.question{
margin-bottom:18px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}

.correct{
background:#d4edda;
}

.wrong{
background:#f8d7da;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

#timer{
font-size:22px;
color:red;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>HTML & CSS MCQ Exam (30 Questions)</h2>

<div id="timer">Time Left: 30:00</div>

<form id="examForm">

<div id="questionArea"></div>

<button type="submit">Submit Exam</button>

</form>

<h2 id="result"></h2>

</div>

<script>

var questions = [

{q:"Which HTML tag is used to create a checkbox?",options:["input type='checkbox'","checkbox","check","box"],answer:0},
{q:"Which tag is used for inserting a line break?",options:["br","lb","break","newline"],answer:0},
{q:"Which HTML element is used for the largest heading?",options:["h1","h6","heading","head"],answer:0},
{q:"Which attribute is used to provide a unique identifier?",options:["id","class","name","key"],answer:0},
{q:"Which tag is used to define a table row?",options:["tr","td","table","th"],answer:0},
{q:"Which HTML tag is used to display preformatted text?",options:["pre","code","text","format"],answer:0},
{q:"Which tag defines a dropdown list?",options:["select","dropdown","list","option"],answer:0},
{q:"Which tag defines an option inside dropdown?",options:["option","select","item","choice"],answer:0},
{q:"Which attribute specifies image path?",options:["src","href","link","path"],answer:0},
{q:"Which tag is used to group form elements?",options:["fieldset","group","formgroup","div"],answer:0},

{q:"Which CSS property controls text alignment?",options:["text-align","align","font-align","center"],answer:0},
{q:"Which CSS property is used to change font style?",options:["font-style","font-weight","text-style","font-type"],answer:0},
{q:"Which value makes text italic?",options:["italic","bold","normal","light"],answer:0},
{q:"Which CSS property sets background image?",options:["background-image","bg-image","image","background"],answer:0},
{q:"Which CSS property controls element visibility?",options:["visibility","display","opacity","show"],answer:0},
{q:"Which value hides element but keeps space?",options:["visibility:hidden","display:none","opacity:0","hide"],answer:0},
{q:"Which CSS property controls border thickness?",options:["border-width","border-size","border","thickness"],answer:0},
{q:"Which CSS property changes list bullets?",options:["list-style-type","bullet","list","style"],answer:0},
{q:"Which CSS property controls element layering?",options:["z-index","layer","stack","index"],answer:0},
{q:"Which property controls transparency?",options:["opacity","visibility","alpha","transparent"],answer:0},

{q:"Which HTML tag is used for inserting audio?",options:["audio","sound","media","music"],answer:0},
{q:"Which HTML tag is used to embed video?",options:["video","media","movie","clip"],answer:0},
{q:"Which input type is used for numbers?",options:["number","numeric","int","digit"],answer:0},
{q:"Which attribute makes field mandatory?",options:["required","validate","must","needed"],answer:0},
{q:"Which tag defines a clickable button?",options:["button","click","input","submit"],answer:0},

{q:"Which CSS unit is relative?",options:["em","px","cm","mm"],answer:0},
{q:"Which CSS property is used to create flexible layout?",options:["display:flex","flex","layout","flexbox"],answer:0},
{q:"Which CSS property defines grid layout?",options:["display:grid","grid","gridbox","layout:grid"],answer:0},
{q:"Which property controls spacing between grid items?",options:["gap","space","grid-gap","margin"],answer:0},
{q:"Which CSS property is used for animation?",options:["animation","transition","effect","move"],answer:0}

];

questions.sort(()=>Math.random()-0.5);

var html="";

questions.forEach(function(q,i){

html+=`<div class="question" id="question${i}">
<p>${i+1}. ${q.q}</p>

<label><input type="radio" name="q${i}" value="0" required> ${q.options[0]}</label><br>
<label><input type="radio" name="q${i}" value="1"> ${q.options[1]}</label><br>
<label><input type="radio" name="q${i}" value="2"> ${q.options[2]}</label><br>
<label><input type="radio" name="q${i}" value="3"> ${q.options[3]}</label><br>

</div>`

});

document.getElementById("questionArea").innerHTML=html;

document.getElementById("examForm").onsubmit=function(e){

e.preventDefault();

var score=0;

questions.forEach(function(q,i){

var selected=document.querySelector('input[name="q'+i+'"]:checked');
var box=document.getElementById("question"+i);

if(Number(selected.value)===q.answer){
score++;
box.classList.add("correct");
}else{
box.classList.add("wrong");
}

box.innerHTML+=`<p><b>Correct Answer:</b> ${q.options[q.answer]}</p>`;

});

document.getElementById("result").innerHTML="Your Score: "+score+" / "+questions.length;

};

var time=1800;

var timer=setInterval(function(){

var m=Math.floor(time/60);
var s=time%60;

document.getElementById("timer").innerHTML="Time Left: "+m+":"+(s<10?"0":"")+s;

time--;

if(time<0){
clearInterval(timer);
document.getElementById("examForm").requestSubmit();
}

},1000);

</script>

</body>
</html>
